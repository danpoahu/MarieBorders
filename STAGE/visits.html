<!DOCTYPE html>
<!--
  STAGE visit log — PRIVATE internal tool for Daniel.
  Not linked from anywhere on the site. noindex. Sign-in required to read.
  Shows who has been viewing the STAGE preview site.
  TODO at launch: remove this page + the logStageVisit() code in site.js.
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>STAGE Visit Log</title>
<style>
  :root {
    --ink: #1a1f24; --ink-soft: #4a5057; --ink-muted: #7a7e84;
    --paper: #faf8f4; --paper-deep: #f1ece2; --hush: #e8e2d4;
    --accent: #a8854c; --accent-deep: #8a6a36; --flag: #7a3134;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--paper-deep); color: var(--ink-soft);
    font-size: 14px; line-height: 1.5;
  }
  .bar {
    background: var(--ink); color: #fff;
    padding: 0.85rem 1.25rem;
    display: flex; justify-content: space-between; align-items: center;
    flex-wrap: wrap; gap: 0.75rem;
  }
  .bar h1 { font-size: 1.1rem; font-weight: 600; }
  .bar button {
    background: transparent; border: 1px solid rgba(255,255,255,0.4);
    color: #fff; padding: 0.35rem 0.85rem; border-radius: 4px;
    font-size: 0.78rem; letter-spacing: 0.08em; text-transform: uppercase;
    cursor: pointer;
  }
  .bar button:hover { background: rgba(255,255,255,0.12); }
  .wrap { max-width: 1000px; margin: 0 auto; padding: 1.5rem 1.25rem; }

  /* Login */
  .login {
    min-height: 80vh; display: flex; align-items: center; justify-content: center;
    padding: 1.5rem;
  }
  .login-card {
    background: #fff; border: 1px solid var(--hush); border-radius: 6px;
    padding: 2rem; max-width: 380px; width: 100%;
  }
  .login-card h2 { font-size: 1.3rem; color: var(--ink); margin-bottom: 1rem; }
  .field { margin-bottom: 0.9rem; }
  .field label {
    display: block; font-size: 0.72rem; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--ink-muted); margin-bottom: 0.25rem;
  }
  .field input {
    width: 100%; padding: 0.6rem 0.7rem; border: 1px solid var(--hush);
    border-radius: 4px; font-size: 0.95rem; font-family: inherit;
  }
  .btn {
    background: var(--accent); color: #fff; border: 0;
    padding: 0.6rem 1.2rem; border-radius: 4px; cursor: pointer;
    font-size: 0.85rem; letter-spacing: 0.08em; text-transform: uppercase;
  }
  .btn:hover { background: var(--accent-deep); }
  .login-err { color: var(--flag); font-size: 0.85rem; margin-top: 0.6rem; display: none; }
  .login-err.show { display: block; }

  /* Stats */
  .stats {
    display: flex; gap: 0.75rem; flex-wrap: wrap; margin-bottom: 1rem;
  }
  .stat {
    background: #fff; border: 1px solid var(--hush); border-radius: 6px;
    padding: 0.7rem 1rem; flex: 1; min-width: 130px;
  }
  .stat .n { font-size: 1.4rem; color: var(--ink); font-weight: 600; }
  .stat .l {
    font-size: 0.66rem; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--ink-muted);
  }

  .hidden-ips {
    background: #fff; border: 1px solid var(--hush); border-radius: 6px;
    padding: 0.6rem 0.9rem; margin-bottom: 1rem; font-size: 0.82rem;
  }
  .hidden-ips .chip {
    display: inline-block; background: var(--paper-deep);
    border-radius: 100px; padding: 2px 8px; margin: 2px;
    font-family: ui-monospace, Menlo, monospace; font-size: 0.78rem;
    cursor: pointer;
  }
  .hidden-ips .chip:hover { background: var(--hush); }

  table { width: 100%; border-collapse: collapse; background: #fff;
    border: 1px solid var(--hush); border-radius: 6px; overflow: hidden; }
  th, td {
    text-align: left; padding: 0.55rem 0.7rem;
    border-bottom: 1px solid var(--hush); font-size: 0.85rem;
    vertical-align: top;
  }
  th {
    background: var(--paper-deep); font-size: 0.66rem;
    letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-muted);
  }
  tr:last-child td { border-bottom: 0; }
  .ip {
    font-family: ui-monospace, Menlo, monospace; font-size: 0.8rem;
    cursor: pointer; color: var(--accent-deep);
  }
  .ip:hover { text-decoration: underline; }
  .where strong { color: var(--ink); }
  .empty { text-align: center; padding: 2.5rem; color: var(--ink-muted); }
  .note { font-size: 0.8rem; color: var(--ink-muted); margin-top: 1rem; }
</style>
</head>
<body>

<div id="login" class="login" style="display:none;">
  <div class="login-card">
    <h2>STAGE Visit Log</h2>
    <form id="login-form">
      <div class="field">
        <label for="le">Email</label>
        <input type="email" id="le" autocomplete="username" required>
      </div>
      <div class="field">
        <label for="lp">Password</label>
        <input type="password" id="lp" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn">Sign In</button>
      <div id="login-err" class="login-err"></div>
    </form>
  </div>
</div>

<div id="app" style="display:none;">
  <div class="bar">
    <h1>STAGE Visit Log</h1>
    <div>
      <button id="refresh">Refresh</button>
      <button id="signout">Sign Out</button>
    </div>
  </div>
  <div class="wrap">
    <div class="stats" id="stats"></div>
    <div class="hidden-ips" id="hidden-ips" style="display:none;"></div>
    <div id="table-wrap"></div>
    <p class="note">
      Click any IP address to hide it (e.g. your own) — hidden IPs are stored only in this
      browser. Location is approximate (city-level, from the visitor's IP) and can be off for
      mobile data or VPN connections. This page is private and unlisted.
    </p>
  </div>
</div>

<script type="module" src="assets/js/firebase-init.js"></script>
<script>
(function () {
  'use strict';
  var HIDDEN_KEY = 'mb-stage-hidden-ips';
  var allVisits = [];

  function whenReady(cb) {
    if (window.MB && window.MB.firebase && window.MB.firebase.db) { cb(); return; }
    window.addEventListener('mb:firebase-ready', cb, { once: true });
    var t = 0, iv = setInterval(function () {
      t++;
      if (window.MB && window.MB.firebase && window.MB.firebase.db) { clearInterval(iv); cb(); }
      else if (t > 40) { clearInterval(iv); cb(); }
    }, 100);
  }

  function getHidden() {
    try { return JSON.parse(localStorage.getItem(HIDDEN_KEY) || '[]'); }
    catch (e) { return []; }
  }
  function setHidden(arr) {
    try { localStorage.setItem(HIDDEN_KEY, JSON.stringify(arr)); } catch (e) {}
  }

  function esc(s) {
    if (s == null) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function deviceLabel(ua) {
    if (!ua) return '—';
    var os = /iPhone/.test(ua) ? 'iPhone'
           : /iPad/.test(ua) ? 'iPad'
           : /Android/.test(ua) ? 'Android'
           : /Macintosh/.test(ua) ? 'Mac'
           : /Windows/.test(ua) ? 'Windows'
           : 'Other';
    var br = /CriOS|Chrome/.test(ua) ? 'Chrome'
           : /Firefox|FxiOS/.test(ua) ? 'Firefox'
           : /Edg/.test(ua) ? 'Edge'
           : /Safari/.test(ua) ? 'Safari'
           : '';
    return br ? os + ' · ' + br : os;
  }

  function fmtWhen(ts) {
    if (!ts || typeof ts.toDate !== 'function') return '—';
    var d = ts.toDate();
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })
      + ' ' + d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
  }

  function render() {
    var hidden = getHidden();
    var visible = allVisits.filter(function (v) { return hidden.indexOf(v.ip) === -1; });

    // Stats
    var ips = {};
    visible.forEach(function (v) { if (v.ip) ips[v.ip] = true; });
    document.getElementById('stats').innerHTML =
        '<div class="stat"><div class="n">' + visible.length + '</div><div class="l">Visits shown</div></div>'
      + '<div class="stat"><div class="n">' + Object.keys(ips).length + '</div><div class="l">Distinct IPs</div></div>'
      + '<div class="stat"><div class="n">' + allVisits.length + '</div><div class="l">Total logged</div></div>';

    // Hidden IPs bar
    var hb = document.getElementById('hidden-ips');
    if (hidden.length) {
      hb.style.display = 'block';
      hb.innerHTML = 'Hidden IPs (click to un-hide): '
        + hidden.map(function (ip) {
            return '<span class="chip" data-unhide="' + esc(ip) + '">' + esc(ip) + ' ✕</span>';
          }).join('');
      hb.querySelectorAll('[data-unhide]').forEach(function (c) {
        c.addEventListener('click', function () {
          var ip = c.getAttribute('data-unhide');
          setHidden(getHidden().filter(function (x) { return x !== ip; }));
          render();
        });
      });
    } else {
      hb.style.display = 'none';
    }

    // Table
    var tw = document.getElementById('table-wrap');
    if (!visible.length) {
      tw.innerHTML = '<div class="empty">No visits to show.</div>';
      return;
    }
    tw.innerHTML = '<table><thead><tr>'
      + '<th>When</th><th>Where</th><th>IP</th><th>Page</th><th>Device</th>'
      + '</tr></thead><tbody>'
      + visible.map(function (v) {
          var where = [v.city, v.region, v.country].filter(Boolean).map(esc).join(', ') || '—';
          return '<tr>'
            + '<td>' + esc(fmtWhen(v.visitedAt)) + '</td>'
            + '<td class="where"><strong>' + where + '</strong></td>'
            + '<td><span class="ip" data-hide="' + esc(v.ip || '') + '" title="Click to hide this IP">' + esc(v.ip || '—') + '</span></td>'
            + '<td>' + esc(v.page || '') + '</td>'
            + '<td>' + esc(deviceLabel(v.userAgent)) + '</td>'
            + '</tr>';
        }).join('')
      + '</tbody></table>';

    tw.querySelectorAll('[data-hide]').forEach(function (el) {
      el.addEventListener('click', function () {
        var ip = el.getAttribute('data-hide');
        if (!ip) return;
        var h = getHidden();
        if (h.indexOf(ip) === -1) { h.push(ip); setHidden(h); render(); }
      });
    });
  }

  function loadVisits() {
    var fb = window.MB.firebase;
    var tw = document.getElementById('table-wrap');
    tw.innerHTML = '<div class="empty">Loading…</div>';
    var fs = fb.fs;
    fs.getDocs(fs.query(fs.collection(fb.db, 'stageVisits'), fs.orderBy('visitedAt', 'desc')))
      .then(function (snap) {
        allVisits = snap.docs.map(function (d) {
          return Object.assign({ id: d.id }, d.data());
        });
        render();
      })
      .catch(function (err) {
        tw.innerHTML = '<div class="empty" style="color:#7a3134;">Could not load: '
          + esc(err.message || '') + '</div>';
      });
  }

  whenReady(function () {
    var fb = window.MB.firebase;
    if (!fb || !fb.auth) {
      document.body.innerHTML = '<div class="empty">Could not load Firebase.</div>';
      return;
    }
    var loginEl = document.getElementById('login');
    var appEl = document.getElementById('app');

    fb.authApi.onAuthStateChanged(fb.auth, function (user) {
      if (user) {
        loginEl.style.display = 'none';
        appEl.style.display = 'block';
        loadVisits();
      } else {
        loginEl.style.display = 'flex';
        appEl.style.display = 'none';
      }
    });

    document.getElementById('login-form').addEventListener('submit', function (e) {
      e.preventDefault();
      var err = document.getElementById('login-err');
      err.classList.remove('show');
      fb.authApi.signInWithEmailAndPassword(
        fb.auth,
        document.getElementById('le').value.trim(),
        document.getElementById('lp').value
      ).catch(function () {
        err.textContent = 'Sign-in failed. Check your email and password.';
        err.classList.add('show');
      });
    });

    document.getElementById('signout').addEventListener('click', function () {
      fb.authApi.signOut(fb.auth);
    });
    document.getElementById('refresh').addEventListener('click', loadVisits);
  });
})();
</script>
</body>
</html>
