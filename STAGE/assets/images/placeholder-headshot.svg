<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" role="img" aria-label="Marie Borders headshot placeholder">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="65%">
      <stop offset="0%" stop-color="#faf8f4"/>
      <stop offset="100%" stop-color="#e8e2d4"/>
    </radialGradient>
  </defs>
  <rect width="600" height="600" fill="url(#bg)"/>
  <!-- soft circular vignette -->
  <circle cx="300" cy="300" r="260" fill="none" stroke="#a8854c" stroke-width="1" stroke-opacity="0.45"/>
  <!-- silhouette suggestion: shoulders + head -->
  <g fill="#1a1f24" fill-opacity="0.08">
    <ellipse cx="300" cy="475" rx="220" ry="120"/>
    <circle cx="300" cy="260" r="90"/>
  </g>
  <!-- monogram MB -->
  <text x="300" y="335" text-anchor="middle"
        font-family="Cormorant Garamond, Georgia, serif"
        font-size="180" font-weight="400" fill="#1a1f24"
        letter-spacing="6">MB</text>
  <text x="300" y="395" text-anchor="middle"
        font-family="Inter, sans-serif" font-size="14"
        letter-spacing="8" fill="#7a7e84">MARIE BORDERS</text>
</svg>
